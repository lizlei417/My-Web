<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>文件整理</title>
  <script>
    (() => {
      if (window.top !== window.self) document.documentElement.classList.add("portal-embedded");
      try {
        const theme = JSON.parse(localStorage.getItem("theme") || "null");
        if (!theme) return;
        const root = document.documentElement;
        if (theme.theme) root.style.setProperty("--theme", theme.theme);
        if (theme.deep) root.style.setProperty("--theme-deep", theme.deep);
        if (theme.soft) root.style.setProperty("--theme-soft", theme.soft);
        if (theme.rgb) root.style.setProperty("--theme-rgb", theme.rgb);
      } catch {}
    })();
  </script>
  <style>
    html.portal-embedded .sidebar,
    html.portal-embedded .global-account-dock {
      visibility: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body class="note-booting" data-global-theme-toggle="true">

    <a class="nav-item" data-nav-key="home" href="../home/index.html" title="主页">

      <span>主页</span>

    <a class="nav-item" data-nav-key="habitat" href="../Habitat/index.html" title="栖息地">

    <button class="nav-item" data-nav-key="bookmarks" type="button" title="网站收藏">

      <span>网站收藏</span>
    </button>
    <a class="nav-item active" data-nav-key="notes" href="./index.html" title="文件整理">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8"/><path d="M8 12h8"/><path d="M8 16h5"/></svg>
      <span>文件整理</span>

    </button>
    <button class="settings" type="button" title="设置">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6 1.65 1.65 0 0 0 10 3.09V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.14.31.5 1 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>
      <span>设置</span>

  </aside>
  <main class="note-page" id="homePage">
    <section class="search-shell" aria-label="搜索">
      <div class="search-bar">
        <svg class="icon search-icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="m20 20-3.6-3.6"></path>
        </svg>
        <input id="searchInput" type="search" placeholder="搜索 空间、文件或内容..." autocomplete="off">
      </div>
      <div class="search-results" id="searchResults" hidden></div>
    </section>

    <section class="hero-copy" aria-label="问候语">
      <h1>Hello, <span id="userName"></span></h1>
      <p id="quoteLine">记录灵感，整理思绪，让知识有所生长。</p>
    </section>

    <section class="workspace-grid">
      <section class="panel quick-panel" aria-labelledby="quickAccessTitle">
        <div class="quick-head">
          <div class="panel-title">
            <svg class="icon title-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3.5 13.6 8l4.4 1.6-4.4 1.6L12 15.8l-1.6-4.6L6 9.6 10.4 8 12 3.5Z"></path>
              <path d="M18.5 14.5 19.3 17l2.2.8-2.2.8-.8 2.4-.8-2.4-2.2-.8 2.2-.8.8-2.5Z"></path>
              <path d="M5.5 14 6 15.7l1.5.5-1.5.6-.5 1.6-.5-1.6-1.5-.6 1.5-.5.5-1.7Z"></path>
            </svg>
            <h2 id="quickAccessTitle">快速访问</h2>
          </div>
          <button class="quick-edit" id="quickEditButton" type="button" aria-label="编辑快速访问">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
        <div class="subject-grid" id="subjectGrid"></div>
      </section>

      <aside class="right-stack">
        <section class="panel pinned-panel" aria-labelledby="pinnedTitle">
          <div class="pinned-head">
            <div class="panel-title">
              <svg class="icon title-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m14 4 6 6"></path>
                <path d="m9 9 6-6 6 6-6 6"></path>
                <path d="m5 19 6-6"></path>
                <path d="m4 14 6 6"></path>
              </svg>
              <h2 id="pinnedTitle">置顶文件夹</h2>
            </div>
            <button class="pin-edit" id="editPinButton" type="button" aria-label="编辑置顶文件夹">
              <span></span>
              <span></span>
              <span></span>
            </button>
          </div>
          <div class="pinned-list" id="pinnedList"></div>
          <button class="pin-add" id="addPinButton" type="button" aria-label="添加置顶文件夹">
            <span>+</span>
          </button>
        </section>

        <section class="upload-panel" id="uploadDropZone" aria-label="上传文件">
          <div class="upload-icon">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 16V5"></path>
              <path d="m7 10 5-5 5 5"></path>
              <path d="M5 16v3h14v-3"></path>
            </svg>
          </div>
          <h2>上传文件</h2>
          <p id="uploadStorageHint">将文件拖到卡片框此处，<br>游客数据仅保存在本地浏览器。</p>
          <button class="primary-button" id="browseButton" type="button">浏览文件</button>
          <input id="fileInput" type="file" multiple hidden>
        </section>
      </aside>
    </section>
  </main>

  <main class="subject-detail-page" id="subjectDetailPage" hidden></main>

  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" id="modalClose" type="button" aria-label="关闭">×</button>
      <h2 id="modalTitle"></h2>
      <div id="modalBody"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase-config.js"></script>
  <script src="../shared-nav.js"></script>
  <script src="script.js"></script>
</body>
</html>
