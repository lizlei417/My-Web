<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Web</title>
  <script>
    (() => {
      try {
        const theme = JSON.parse(localStorage.getItem("theme") || "null");
        if (!theme) return;
        const root = document.documentElement;
        if (theme.theme) root.style.setProperty("--theme", theme.theme);
        if (theme.deep) root.style.setProperty("--theme-deep", theme.deep);
        if (theme.soft) root.style.setProperty("--theme-soft", theme.soft);
        if (theme.rgb) root.style.setProperty("--theme-rgb", theme.rgb);
      } catch {}
    })();
  </script>
  <link rel="stylesheet" href="music/player.css">
  <style>
    :root {
      --theme: #7fa9eb;
      --theme-deep: #6f92cf;
      --theme-soft: #a9caff;
      --theme-rgb: 127,169,235;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #fff;
    }

    .portal-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      background: transparent;
      cursor: pointer;
    }

    .shell-sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 1200;
      display: flex;
      width: 82px;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 72px 0 36px;
      color: rgba(var(--theme-rgb), .72);
      pointer-events: none;
    }

    .shell-nav-item,
    .shell-add,
    .shell-settings {
      position: relative;
      display: grid;
      place-items: center;
      gap: 7px;
      width: 64px;
      min-height: 54px;
      color: rgba(var(--theme-rgb), .72);
      text-decoration: none;
      pointer-events: auto;
      transition: color .2s ease, transform .2s ease;
    }

    .shell-nav-item svg,
    .shell-add svg,
    .shell-settings svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      filter: drop-shadow(0 4px 7px rgba(var(--theme-rgb), .14));
    }

    .shell-nav-item span,
    .shell-settings span {
      font-size: 12px;
      line-height: 1;
    }

    .shell-nav-item:hover,
    .shell-nav-item.active,
    .shell-add:hover,
    .shell-settings:hover {
      color: var(--theme-deep);
      transform: translateY(-1px);
    }

    .shell-nav-item.active::after {
      content: "";
      position: absolute;
      top: 5px;
      right: 0;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--theme-soft);
      box-shadow: 0 0 0 4px rgba(var(--theme-rgb), .13);
    }

    .shell-add {
      margin-top: 4px;
    }

    .shell-widget-menu {
      position: fixed;
      left: 76px;
      z-index: 1300;
      display: grid;
      min-width: 132px;
      padding: 8px;
      border: 1px solid rgba(255,255,255,.82);
      border-radius: 14px;
      background: rgba(255,255,255,.9);
      box-shadow: 0 22px 54px rgba(var(--theme-rgb), .16), inset 0 1px 0 rgba(255,255,255,.86);
      backdrop-filter: blur(18px);
      opacity: 0;
      transform: translate(-4px, 4px);
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
    }

    .shell-widget-menu.open {
      opacity: 1;
      transform: translate(0, 0);
      pointer-events: auto;
    }

    .shell-widget-menu button {
      min-height: 38px;
      padding: 0 13px;
      border-radius: 10px;
      color: var(--theme-deep);
      text-align: left;
      white-space: nowrap;
    }

    .shell-widget-menu button:hover {
      color: #fff;
      background: var(--theme);
      box-shadow: 0 8px 18px rgba(var(--theme-rgb), .24);
    }

    .shell-settings {
      margin-top: auto;
    }

    .shell-settings-menu {
      position: fixed;
      left: 76px;
      bottom: 34px;
      z-index: 1300;
      display: grid;
      gap: 6px;
      min-width: 150px;
      padding: 8px;
      border: 1px solid rgba(255,255,255,.82);
      border-radius: 14px;
      background: rgba(255,255,255,.88);
      box-shadow: 0 22px 54px rgba(var(--theme-rgb), .16), inset 0 1px 0 rgba(255,255,255,.86);
      backdrop-filter: blur(18px);
      opacity: 0;
      transform: translate(-4px, 8px);
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
    }

    .shell-settings-menu.open {
      opacity: 1;
      transform: translate(0, 0);
      pointer-events: auto;
    }

    .shell-settings-menu button {
      min-height: 36px;
      padding: 0 12px;
      border-radius: 10px;
      color: var(--theme-deep);
      font-size: 14px;
      text-align: left;
    }

    .shell-settings-menu button:hover {
      background: rgba(var(--theme-rgb), .1);
    }

    .shell-settings-menu .save {
      color: #fff;
      background: var(--theme);
      text-align: center;
      box-shadow: 0 10px 22px rgba(var(--theme-rgb), .28);
      font-weight: 700;
    }

    .shell-settings-menu .save:hover {
      color: #fff;
      background: var(--theme-deep);
      box-shadow: 0 12px 26px rgba(var(--theme-rgb), .38);
    }

    .shell-settings-menu .danger {
      color: #d35454;
    }

    .shell-sidebar.reorder-mode .shell-nav-item:not([data-route-key="home"]) {
      cursor: grab;
    }

    .shell-sidebar.reorder-mode .shell-nav-item:not([data-route-key="home"])::before {
      content: "";
      position: absolute;
      inset: -5px;
      border: 1px dashed rgba(var(--theme-rgb), .35);
      border-radius: 14px;
    }

    .shell-nav-item.dragging {
      opacity: .4;
      transform: scale(.96);
    }

    .shell-account {
      position: fixed;
      right: 54px;
      bottom: 36px;
      z-index: 1200;
      display: grid;
      justify-items: end;
      pointer-events: none;
    }

    .shell-account-toggle {
      display: grid;
      place-items: center;
      width: 50px;
      height: 50px;
      border: 1px solid rgba(255,255,255,.78);
      border-radius: 50%;
      background: rgba(255,255,255,.76);
      box-shadow: 0 18px 46px rgba(var(--theme-rgb), .14), inset 0 1px 0 rgba(255,255,255,.86);
      backdrop-filter: blur(20px);
      pointer-events: auto;
    }

    .shell-account-avatar {
      position: relative;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 28%, rgba(255,255,255,.96), rgba(255,255,255,.38) 44%, rgba(var(--theme-rgb), .28)),
        linear-gradient(145deg, var(--theme-soft), var(--theme));
      box-shadow: 0 0 0 3px rgba(var(--theme-rgb), .16), inset 0 0 0 1px rgba(255,255,255,.76);
    }

    .shell-account.signed-in .shell-account-avatar::after {
      content: "";
      position: absolute;
      right: -2px;
      bottom: -1px;
      width: 10px;
      height: 10px;
      border: 2px solid #fff;
      border-radius: 50%;
      background: #54c982;
    }

    .shell-account-panel {
      position: absolute;
      right: 0;
      bottom: 64px;
      display: grid;
      gap: 10px;
      width: min(330px, calc(100vw - 42px));
      padding: 16px;
      border: 1px solid rgba(255,255,255,.82);
      border-radius: 18px;
      background: rgba(255,255,255,.88);
      box-shadow: 0 28px 72px rgba(var(--theme-rgb), .18);
      backdrop-filter: blur(22px);
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
    }

    .shell-account-panel.open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .shell-account-copy {
      display: grid;
      gap: 4px;
    }

    .shell-account-copy strong {
      color: #202636;
      font-size: 15px;
    }

    .shell-account-copy span,
    .shell-guest-note {
      color: #8c98b0;
      font-size: 12px;
      line-height: 1.45;
    }

    .shell-account-panel input {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      border: 1px solid rgba(var(--theme-rgb), .2);
      border-radius: 12px;
      color: #202636;
      background: rgba(255,255,255,.76);
      outline: none;
    }

    .shell-account-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .shell-account-panel .ghost,
    .shell-account-panel .primary,
    .shell-account-panel .guest,
    .shell-account-panel .sign-out {
      min-height: 38px;
      border-radius: 12px;
    }

    .shell-account-panel .ghost {
      color: var(--theme-deep);
      box-shadow: inset 0 0 0 1px rgba(var(--theme-rgb), .16);
    }

    .shell-account-panel .primary {
      color: #fff;
      background: var(--theme);
    }

    .shell-account-panel .guest {
      color: var(--theme-deep);
      background: rgba(var(--theme-rgb), .1);
    }

    .shell-account-panel .sign-out {
      color: #d35454;
      background: rgba(211,84,84,.08);
    }

    .shell-account-panel [hidden],
    .shell-settings-menu [hidden] {
      display: none !important;
    }

    .global-top-tools {
      position: fixed;
      top: 36px;
      right: 138px;
      z-index: 1000;
      display: flex;
      align-items: flex-start;
      pointer-events: none;
    }

    .global-player {
      display: grid;
      grid-template-columns: 48px minmax(128px, 1fr) 32px 52px 32px;
      align-items: center;
      gap: 14px;
      width: 420px;
      min-width: 420px;
      height: 74px;
      padding: 10px 18px;
      border: 1px solid rgba(255,255,255,.78);
      border-radius: 28px;
      background: rgba(255,255,255,.76);
      box-shadow: 0 18px 46px rgba(var(--theme-rgb), .14), inset 0 0 22px rgba(255,255,255,.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      pointer-events: auto;
    }

    .global-player .cover {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.72), 0 8px 20px rgba(var(--theme-rgb), .18);
    }

    .global-player p {
      margin: 0;
    }

    .global-player .song-title {
      color: #202636;
      font-size: 15px;
      font-weight: 700;
    }

    .global-player .artist {
      margin-top: 5px;
      color: #9aa4b8;
      font-size: 13px;
    }

    .global-player .player-btn {
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 50%;
      color: rgba(var(--theme-rgb), .72);
      background: transparent;
      cursor: pointer;
    }

    .global-player .player-btn.play {
      width: 42px;
      height: 42px;
      color: #fff;
      background: linear-gradient(145deg, var(--theme-deep), var(--theme-soft));
      box-shadow: 0 12px 24px rgba(var(--theme-rgb), .28);
    }

    .global-player .player-btn svg {
      width: 20px;
      height: 20px;
    }

    @media (max-width: 900px) {
      .shell-sidebar {
        width: 68px;
        gap: 20px;
        padding-top: 44px;
      }

      .shell-nav-item,
      .shell-add,
      .shell-settings {
        width: 56px;
      }

      .shell-account {
        right: 20px;
        bottom: 20px;
      }

      .global-top-tools,
      body.route-with-theme .global-top-tools,
      body.route-home .global-top-tools {
        top: 18px;
        right: 92px;
      }

      .global-player,
      body.route-home .global-player {
        grid-template-columns: 42px minmax(0, 1fr) 40px;
        width: 184px;
        min-width: 184px;
        height: 64px;
        padding: 9px 10px;
        gap: 9px;
        border-radius: 23px;
      }

      .global-player .player-btn.skip,
      .global-player .artist {
        display: none;
      }

      .global-player .cover {
        width: 42px;
        height: 42px;
      }
    }
  </style>
</head>
<body class="route-home route-with-theme">
  <iframe class="portal-frame" id="portalFrame" src="home/index.html" title="个人门户内容"></iframe>

  <aside class="shell-sidebar" aria-label="左侧导航">
    <button class="shell-nav-item active" data-route-key="home" data-route="home/index.html" type="button" title="主页">
      <svg viewBox="0 0 24 24"><path d="m3 11 9-8 9 8"/><path d="M5 10v10h5v-6h4v6h5V10"/></svg><span>主页</span>
    </button>
    <button class="shell-nav-item" data-route-key="habitat" data-route="Habitat/index.html" type="button" title="栖息地">
      <svg viewBox="0 0 24 24"><path d="m3 12 9-8 9 8"/><path d="M5 10.5V20h14v-9.5"/><path d="M9 20v-6h6v6"/></svg><span>栖息地</span>
    </button>
    <button class="shell-nav-item" data-route-key="journal" data-route="plan-journal/index.html" type="button" title="计划日记">

    </button>
    <button class="shell-nav-item" data-route-key="bookmarks" type="button" title="网站收藏">
      <svg viewBox="0 0 24 24"><path d="M6 3h12a1 1 0 0 1 1 1v18l-7-4-7 4V4a1 1 0 0 1 1-1Z"/></svg><span>网站收藏</span>
    </button>
    <button class="shell-nav-item" data-route-key="notes" data-route="Note/index.html" type="button" title="文件整理">
      <svg viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8"/><path d="M8 12h8"/><path d="M8 16h5"/></svg><span>文件整理</span>
    </button>
    <button class="shell-add" type="button" title="添加小组件">
      <svg viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
    </button>
    <div class="shell-widget-menu" aria-label="添加小组件">
      <button data-widget-action="bubble" type="button">🫧 气泡</button>
    </div>
    <button class="shell-settings" type="button" title="设置">
      <svg viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6 1.65 1.65 0 0 0 10 3.09V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.14.31.5 1 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg><span>设置</span>
    </button>
    <div class="shell-settings-menu" aria-label="设置菜单">
      <button data-shell-action="reorder" type="button">调整组件顺序</button>
      <button class="save" data-shell-action="save-order" type="button" hidden>保存顺序</button>
      <button class="danger" data-shell-action="sign-out" type="button">退出登录</button>
    </div>
  </aside>

  <section class="shell-account" aria-label="账号">
    <button class="shell-account-toggle" type="button" aria-expanded="false" title="账号">
      <span class="shell-account-avatar" aria-hidden="true"></span>
    </button>
    <div class="shell-account-panel">
      <div class="shell-account-copy">
        <strong>未登录</strong>
        <span>登录后，网站中的数据内容可同步到你的 Supabase 账号。</span>
      </div>
      <input class="shell-account-email" type="email" autocomplete="email" placeholder="邮箱">
      <input class="shell-account-password" type="password" autocomplete="current-password" placeholder="密码">
      <div class="shell-account-actions">
        <button class="ghost" data-account-action="sign-up" type="button">注册</button>
        <button class="primary" data-account-action="sign-in" type="button">登录</button>
      </div>
      <button class="guest" data-account-action="guest" type="button">游客登录</button>
      <p class="shell-guest-note">游客登录状态下，网站数据仅保存在当前浏览器。</p>
    </div>
  </section>

  <section class="global-top-tools" aria-label="全局音乐播放器">
    <div class="global-player">
      <div class="cover" aria-hidden="true"></div>
      <div>
        <p class="song-title">音乐播放器</p>
        <p class="artist">正在载入歌单...</p>
      </div>
      <button class="player-btn skip" type="button" title="上一首" aria-label="上一首"></button>
      <button class="player-btn play" type="button" title="播放" aria-label="播放"></button>
      <button class="player-btn skip" type="button" title="下一首" aria-label="下一首"></button>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="music/player.js"></script>
  <script>
    (() => {
      const frame = document.getElementById("portalFrame");
      const params = new URLSearchParams(window.location.search);
      const allowedRoots = ["home/", "Habitat/", "plan-journal/", "Note/"];
      const navItems = [...document.querySelectorAll(".shell-nav-item[data-route]")];
      const accountDock = document.querySelector(".shell-account");
      const accountToggle = document.querySelector(".shell-account-toggle");
      const accountPanel = document.querySelector(".shell-account-panel");
      const accountTitle = accountPanel.querySelector("strong");
      const accountStatus = accountPanel.querySelector(".shell-account-copy span");
      const accountEmail = accountPanel.querySelector(".shell-account-email");
      const accountPassword = accountPanel.querySelector(".shell-account-password");
      const accountActions = accountPanel.querySelector(".shell-account-actions");
      const guestButton = accountPanel.querySelector("[data-account-action='guest']");
      const guestNote = accountPanel.querySelector(".shell-guest-note");
      const sidebar = document.querySelector(".shell-sidebar");
      const addButton = document.querySelector(".shell-add");
      const widgetMenu = document.querySelector(".shell-widget-menu");
      const addBubbleButton = widgetMenu.querySelector("[data-widget-action='bubble']");
      const settingsButton = document.querySelector(".shell-settings");
      const settingsMenu = document.querySelector(".shell-settings-menu");
      const reorderButton = settingsMenu.querySelector("[data-shell-action='reorder']");
      const saveOrderButton = settingsMenu.querySelector("[data-shell-action='save-order']");
      const signOutButton = settingsMenu.querySelector("[data-shell-action='sign-out']");
      const config = window.SUPABASE_CONFIG || {};
      const authClient = window.supabase && config.url && config.anonKey
        ? window.supabase.createClient(config.url, config.anonKey)
        : null;
      let reorderMode = false;
      let draggingNavItem = null;
      let shellUser = null;

      const normalizeRoute = (value) => {
        const route = String(value || "home/index.html").replace(/^\/+/, "");
        if (route.includes("..") || !allowedRoots.some((root) => route.startsWith(root))) {
          return "home/index.html";
        }
        return route;
      };

      const setRouteStyle = (route) => {
        const clean = route.split(/[?#]/)[0];
        document.body.classList.toggle("route-home", clean.startsWith("home/"));
        document.body.classList.toggle("route-with-theme", clean.startsWith("home/") || clean.startsWith("Note/"));
        const activeKey = clean.startsWith("Habitat/")
          ? "habitat"
          : clean.startsWith("plan-journal/")
            ? "journal"
            : clean.startsWith("Note/")
              ? "notes"
              : "home";
        document.querySelectorAll(".shell-nav-item").forEach((item) => {
          item.classList.toggle("active", item.dataset.routeKey === activeKey);
        });
      };

      const requestedRoute = normalizeRoute(params.get("page"));
      let currentRoute = requestedRoute;
      frame.src = requestedRoute;
      setRouteStyle(requestedRoute);

      const updateAddress = (route, replace = false) => {
        const url = new URL(window.location.href);
        url.searchParams.set("page", route);
        const method = replace ? "replaceState" : "pushState";
        history[method]({ route }, "", url);
        setRouteStyle(route);
      };

      const navigateTo = (route) => {
        const next = normalizeRoute(route);
        if (currentRoute === next) return;
        currentRoute = next;
        frame.src = next;
        updateAddress(next);
      };

      navItems.forEach((item) => {
        item.addEventListener("click", (event) => {
          if (reorderMode) {
            event.preventDefault();
            event.stopPropagation();
            return;
          }
          navigateTo(item.dataset.route);
        });
      });

      const setWidgetMenuOpen = (open) => {
        if (open) {
          const rect = addButton.getBoundingClientRect();
          const menuHeight = widgetMenu.offsetHeight || 54;
          const top = Math.max(16, Math.min(window.innerHeight - menuHeight - 16, rect.top + rect.height / 2 - menuHeight / 2));
          widgetMenu.style.top = `${top}px`;
        }
        widgetMenu.classList.toggle("open", open);
      };

      const addHomeBubble = () => {
        try {
          frame.contentWindow.postMessage({
            type: "portal:add-home-bubble",
            user: {
              id: shellUser?.id || "",
              email: shellUser?.email || "",
              isGuest: Boolean(shellUser?.isGuest)
            }
          }, "*");
          return true;
        } catch {
          return false;
        }
      };

      addButton.addEventListener("click", (event) => {
        event.stopPropagation();
        if (reorderMode) return;
        if (!currentRoute.startsWith("home/")) return;
        setWidgetMenuOpen(!widgetMenu.classList.contains("open"));
        settingsMenu.classList.remove("open");
      });

      addBubbleButton.addEventListener("click", (event) => {
        event.stopPropagation();
        if (!shellUser) {
          setWidgetMenuOpen(false);
          setAccountOpen(true);
          return;
        }
        const added = addHomeBubble();
        setWidgetMenuOpen(false);
      });

      document.querySelector(".shell-settings").addEventListener("click", () => {
        settingsMenu.classList.toggle("open");
      });

      try {
        const savedOrder = JSON.parse(localStorage.getItem("portalNavOrder") || "[]");
        const before = document.querySelector(".shell-add");
        const byKey = new Map([...document.querySelectorAll(".shell-nav-item")].map((item) => [item.dataset.routeKey, item]));
        const orderedNav = document.createDocumentFragment();
        ["home", ...savedOrder.filter((key) => key !== "home")].forEach((key) => {
          const item = byKey.get(key);
          if (item) orderedNav.appendChild(item);
        });
        before.parentElement.insertBefore(orderedNav, before);
        const homeItem = byKey.get("home");
        const firstItem = before.parentElement.querySelector(".shell-nav-item");
        if (homeItem && firstItem !== homeItem) before.parentElement.insertBefore(homeItem, firstItem);
      } catch {}

      frame.addEventListener("load", () => {
        try {
          const childUrl = new URL(frame.contentWindow.location.href);
          const shellDir = new URL("./", window.location.href).pathname;
          const route = normalizeRoute(`${childUrl.pathname.slice(shellDir.length)}${childUrl.search}${childUrl.hash}`);
          const current = normalizeRoute(new URLSearchParams(window.location.search).get("page"));
          currentRoute = route;
          if (route !== current) updateAddress(route);
          else setRouteStyle(route);
          frame.contentWindow.addEventListener("hashchange", () => {
            const changed = new URL(frame.contentWindow.location.href);
            const next = normalizeRoute(`${changed.pathname.slice(shellDir.length)}${changed.search}${changed.hash}`);
            currentRoute = next;
            updateAddress(next, true);
          });
        } catch {}
      });

      window.addEventListener("popstate", (event) => {
        const route = normalizeRoute(event.state?.route || new URLSearchParams(window.location.search).get("page"));
        if (currentRoute !== route) {
          currentRoute = route;
          frame.src = route;
        }
        setRouteStyle(route);
      });

      window.addEventListener("storage", (event) => {
        if (event.key !== "theme" || !event.newValue) return;
        try {
          const theme = JSON.parse(event.newValue);
          if (theme.theme) document.documentElement.style.setProperty("--theme", theme.theme);
          if (theme.deep) document.documentElement.style.setProperty("--theme-deep", theme.deep);
          if (theme.soft) document.documentElement.style.setProperty("--theme-soft", theme.soft);
          if (theme.rgb) document.documentElement.style.setProperty("--theme-rgb", theme.rgb);
        } catch {}
      });

      const setAccountOpen = (open) => {
        accountPanel.classList.toggle("open", open);
        accountToggle.setAttribute("aria-expanded", String(open));
      };

      const setAccountMessage = (title, detail) => {
        accountTitle.textContent = title;
        accountStatus.textContent = detail;
      };

      const refreshContentSession = () => {
        try {
          frame.contentWindow.location.reload();
        } catch {}
      };

      const applyAccountSession = (session) => {
        const guest = localStorage.getItem("portalGuestSession") === "1";
        const user = session?.user || null;
        const signedIn = Boolean(user || guest);
        shellUser = user || (guest ? { id: "guest", email: "游客", isGuest: true } : null);
        accountDock.classList.toggle("signed-in", signedIn);
        accountEmail.hidden = signedIn;
        accountPassword.hidden = signedIn;
        accountActions.hidden = signedIn;
        guestButton.hidden = signedIn;
        signOutButton.hidden = !signedIn;
        guestNote.hidden = Boolean(user);
        if (user) {
          localStorage.setItem("portalCurrentUserEmail", user.email || "");
          setAccountMessage("已登录", user.email || "账号数据已开启同步");
        } else if (guest) {
          localStorage.removeItem("portalCurrentUserEmail");
          setAccountMessage("游客登录", "网站数据仅保存在当前浏览器。");
        } else {
          localStorage.removeItem("portalCurrentUserEmail");
          setAccountMessage("未登录", "登录后，网站中的数据内容可同步到你的 Supabase 账号。");
        }
      };

      accountToggle.addEventListener("click", (event) => {
        event.stopPropagation();
        setAccountOpen(!accountPanel.classList.contains("open"));
      });
      accountPanel.addEventListener("click", (event) => event.stopPropagation());
      document.addEventListener("click", (event) => {
        if (!event.target.closest(".shell-account")) setAccountOpen(false);
        if (!event.target.closest(".shell-settings-menu, .shell-settings")) settingsMenu.classList.remove("open");
        if (!event.target.closest(".shell-widget-menu, .shell-add")) setWidgetMenuOpen(false);
      });

      accountPanel.addEventListener("click", async (event) => {
        const action = event.target.closest("[data-account-action]")?.dataset.accountAction;
        if (!action) return;
        if (action === "guest") {
          localStorage.setItem("portalGuestSession", "1");
          applyAccountSession(null);
          setAccountOpen(false);
          refreshContentSession();
          return;
        }
        if (!authClient) {
          setAccountMessage("Supabase 未配置", "请检查项目根目录的 supabase-config.js。");
          return;
        }
        const email = accountEmail.value.trim();
        const password = accountPassword.value;
        if (!email || !password) {
          setAccountMessage("请输入邮箱和密码", "完成后即可登录或注册。");
          return;
        }
        if (action === "sign-up") {
          const { error } = await authClient.auth.signUp({ email, password });
          setAccountMessage(error ? "注册失败" : "注册成功", error?.message || "请根据邮箱确认设置完成注册。");
          return;
        }
        localStorage.removeItem("portalGuestSession");
        const { error } = await authClient.auth.signInWithPassword({ email, password });
        if (error) {
          setAccountMessage("登录失败", error.message);
          return;
        }
        accountPassword.value = "";
        setAccountOpen(false);
        refreshContentSession();
      });

      const setReorderMode = (enabled) => {
        reorderMode = enabled;
        sidebar.classList.toggle("reorder-mode", enabled);
        saveOrderButton.hidden = !enabled;
        reorderButton.textContent = enabled ? "正在调整组件顺序" : "调整组件顺序";
        sidebar.querySelectorAll(".shell-nav-item").forEach((item) => {
          item.draggable = enabled && item.dataset.routeKey !== "home";
        });
      };

      const persistNavOrder = () => {
        const order = [...sidebar.querySelectorAll(".shell-nav-item")].map((item) => item.dataset.routeKey);
        localStorage.setItem("portalNavOrder", JSON.stringify(order));
      };

      sidebar.addEventListener("dragstart", (event) => {
        if (!reorderMode) return;
        const item = event.target.closest(".shell-nav-item");
        if (!item || item.dataset.routeKey === "home") {
          event.preventDefault();
          return;
        }
        draggingNavItem = item;
        item.classList.add("dragging");
        event.dataTransfer.effectAllowed = "move";
      });

      sidebar.addEventListener("dragover", (event) => {
        if (!reorderMode || !draggingNavItem) return;
        event.preventDefault();
        const items = [...sidebar.querySelectorAll(".shell-nav-item:not([data-route-key='home'])")]
          .filter((item) => item !== draggingNavItem);
        const after = items.find((item) => {
          const rect = item.getBoundingClientRect();
          return event.clientY < rect.top + rect.height / 2;
        });
        sidebar.insertBefore(draggingNavItem, after || document.querySelector(".shell-add"));
      });

      sidebar.addEventListener("dragend", () => {
        draggingNavItem?.classList.remove("dragging");
        draggingNavItem = null;
      });

      settingsMenu.addEventListener("click", async (event) => {
        event.stopPropagation();
        const action = event.target.closest("[data-shell-action]")?.dataset.shellAction;
        if (action === "reorder") {
          setReorderMode(true);
          return;
        }
        if (action === "save-order") {
          persistNavOrder();
          setReorderMode(false);
          settingsMenu.classList.remove("open");
          return;
        }
        if (action === "sign-out") {
          localStorage.removeItem("portalGuestSession");
          localStorage.removeItem("portalCurrentUserEmail");
          if (authClient) await authClient.auth.signOut();
          applyAccountSession(null);
          settingsMenu.classList.remove("open");
          refreshContentSession();
        }
      });

      if (authClient) {
        authClient.auth.getSession().then(({ data }) => applyAccountSession(data?.session || null));
        authClient.auth.onAuthStateChange((_event, session) => applyAccountSession(session));
      } else {
        applyAccountSession(null);
      }
    })();
  </script>
</body>
</html>
