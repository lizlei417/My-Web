<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Web</title>
  <script>
    (() => {
      try {
        const theme = JSON.parse(localStorage.getItem("theme") || "null");
        if (!theme) return;
        const root = document.documentElement;
        if (theme.theme) root.style.setProperty("--theme", theme.theme);
        if (theme.deep) root.style.setProperty("--theme-deep", theme.deep);
        if (theme.soft) root.style.setProperty("--theme-soft", theme.soft);
        if (theme.rgb) root.style.setProperty("--theme-rgb", theme.rgb);
      } catch {}
    })();
  </script>
  <link rel="stylesheet" href="music/player.css">
  <style>
    :root {
      --theme: #7fa9eb;
      --theme-deep: #6f92cf;
      --theme-soft: #a9caff;
      --theme-rgb: 127,169,235;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #fff;
    }

    .portal-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      background: transparent;
      cursor: pointer;
    }

    .shell-sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 1200;
      display: flex;
      width: 82px;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 72px 0 36px;
      color: rgba(var(--theme-rgb), .72);
      pointer-events: none;
    }

    .shell-nav-item,
    .shell-add,
    .shell-settings {
      position: relative;
      display: grid;
      place-items: center;
      gap: 7px;
      width: 64px;
      min-height: 54px;
      color: rgba(var(--theme-rgb), .72);
      text-decoration: none;
      pointer-events: auto;
      transition: color .2s ease, transform .2s ease;
    }

    .shell-nav-item svg,
    .shell-add svg,
    .shell-settings svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      filter: drop-shadow(0 4px 7px rgba(var(--theme-rgb), .14));
    }

    .shell-nav-item span,
    .shell-settings span {
      font-size: 12px;
      line-height: 1;
    }

    .shell-nav-item:hover,
    .shell-nav-item.active,
    .shell-add:hover,
    .shell-settings:hover {
      color: var(--theme-deep);
      transform: translateY(-1px);
    }

    .shell-nav-item[hidden] {
      display: none !important;
    }

    .shell-nav-item.active::after {
      content: "";
      position: absolute;
      top: 5px;
      right: 0;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--theme-soft);
      box-shadow: 0 0 0 4px rgba(var(--theme-rgb), .13);
    }

    .shell-add {
      margin-top: 4px;
    }

    .shell-widget-menu {
      position: fixed;
      left: 76px;
      z-index: 1300;
      display: grid;
      min-width: 132px;
      padding: 8px;
      border: 1px solid rgba(255,255,255,.82);
      border-radius: 14px;
      background: rgba(255,255,255,.9);
      box-shadow: 0 22px 54px rgba(var(--theme-rgb), .16), inset 0 1px 0 rgba(255,255,255,.86);
      backdrop-filter: blur(18px);
      opacity: 0;
      transform: translate(-4px, 4px);
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
    }

    .shell-widget-menu.open {
      opacity: 1;
      transform: translate(0, 0);
      pointer-events: auto;
    }

    .shell-widget-menu button {
      display: flex;
      align-items: center;
      gap: 9px;
      width: 100%;
      min-height: 38px;
      padding: 0 13px;
      border-radius: 10px;
      color: var(--theme-deep);
      text-align: left;
      white-space: nowrap;
    }

    .shell-widget-menu button:hover {
      color: #fff;
      background: var(--theme);
      box-shadow: 0 8px 18px rgba(var(--theme-rgb), .24);
    }

    .shell-widget-menu svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
    }

    .shell-widget-components,
    .shell-widget-home-options {
      display: grid;
    }

    .shell-widget-menu [hidden] {
      display: none !important;
    }

    .shell-widget-divider {
      height: 1px;
      margin: 7px 8px;
      background: rgba(var(--theme-rgb), .16);
    }

    .shell-widget-empty {
      margin: 0;
      padding: 9px 13px;
      color: rgba(var(--theme-rgb), .58);
      font-size: 12px;
      white-space: nowrap;
    }

    .shell-settings {
      margin-top: auto;
    }

    .shell-settings-menu {
      position: fixed;
      left: 76px;
      bottom: 34px;
      z-index: 1300;
      display: grid;
      gap: 6px;
      min-width: 150px;
      padding: 8px;
      border: 1px solid rgba(255,255,255,.82);
      border-radius: 14px;
      background: rgba(255,255,255,.88);
      box-shadow: 0 22px 54px rgba(var(--theme-rgb), .16), inset 0 1px 0 rgba(255,255,255,.86);
      backdrop-filter: blur(18px);
      opacity: 0;
      transform: translate(-4px, 8px);
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
    }

    .shell-settings-menu.open {
      opacity: 1;
      transform: translate(0, 0);
      pointer-events: auto;
    }

    .shell-settings-menu button {
      min-height: 36px;
      padding: 0 12px;
      border-radius: 10px;
      color: var(--theme-deep);
      font-size: 14px;
      text-align: left;
    }

    .shell-settings-menu button:hover {
      background: rgba(var(--theme-rgb), .1);
    }

    .shell-settings-menu .save {
      color: #fff;
      background: var(--theme);
      text-align: center;
      box-shadow: 0 10px 22px rgba(var(--theme-rgb), .28);
      font-weight: 700;
    }

    .shell-settings-menu .save:hover {
      color: #fff;
      background: var(--theme-deep);
      box-shadow: 0 12px 26px rgba(var(--theme-rgb), .38);
    }

    .shell-settings-menu .danger {
      color: #d35454;
    }

    .shell-sidebar.reorder-mode .shell-nav-item:not([data-route-key="home"]) {
      cursor: grab;
    }

    .shell-sidebar.reorder-mode .shell-nav-item:not([data-route-key="home"])::before {
      content: "";
      position: absolute;
      inset: -5px;
      border: 1px dashed rgba(var(--theme-rgb), .35);
      border-radius: 14px;
    }

    .shell-nav-remove {
      position: absolute;
      top: -9px;
      right: -7px;
      z-index: 2;
      display: none;
      place-items: center;
      width: 17px;
      height: 17px;
      border: 2px solid rgba(255,255,255,.96);
      border-radius: 50%;
      color: #fff;
      background: #eb6b72;
      box-shadow: 0 4px 10px rgba(190,55,65,.22);
      font-size: 14px;
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
    }

    .shell-sidebar.reorder-mode .shell-nav-item:not([data-route-key="home"]) .shell-nav-remove {
      display: grid;
    }

    .shell-nav-remove:hover {
      background: #db515a;
      transform: scale(1.08);
    }

    body.reorder-lock .portal-frame,
    body.reorder-lock .shell-add,
    body.reorder-lock .shell-account,
    body.reorder-lock .shell-account *,
    body.reorder-lock .global-top-tools,
    body.reorder-lock .global-top-tools *,
    body.reorder-lock .sticky-garden,
    body.reorder-lock .sticky-garden *,
    body.reorder-lock .garden-dialog,
    body.reorder-lock .garden-dialog * {
      pointer-events: none !important;
    }

    body.reorder-lock .shell-settings {
      pointer-events: none;
    }

    body.reorder-lock .shell-settings-menu button:not([data-shell-action="save-order"]) {
      pointer-events: none;
      opacity: .45;
    }

    .shell-nav-item.dragging {
      opacity: .4;
      transform: scale(.96);
    }

    .shell-account {
      position: fixed;
      right: 54px;
      bottom: 36px;
      z-index: 1200;
      display: grid;
      justify-items: end;
      pointer-events: none;
    }

    .shell-account-toggle {
      display: grid;
      place-items: center;
      width: 50px;
      height: 50px;
      border: 1px solid rgba(255,255,255,.78);
      border-radius: 50%;
      background: rgba(255,255,255,.76);
      box-shadow: 0 18px 46px rgba(var(--theme-rgb), .14), inset 0 1px 0 rgba(255,255,255,.86);
      backdrop-filter: blur(20px);
      pointer-events: auto;
    }

    .shell-account-avatar {
      position: relative;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 28%, rgba(255,255,255,.96), rgba(255,255,255,.38) 44%, rgba(var(--theme-rgb), .28)),
        linear-gradient(145deg, var(--theme-soft), var(--theme));
      box-shadow: 0 0 0 3px rgba(var(--theme-rgb), .16), inset 0 0 0 1px rgba(255,255,255,.76);
    }

    .shell-account.signed-in .shell-account-avatar::after {
      content: "";
      position: absolute;
      right: -2px;
      bottom: -1px;
      width: 10px;
      height: 10px;
      border: 2px solid #fff;
      border-radius: 50%;
      background: #54c982;
    }

    .shell-account-panel {
      position: absolute;
      right: 0;
      bottom: 64px;
      display: grid;
      gap: 10px;
      width: min(330px, calc(100vw - 42px));
      padding: 16px;
      border: 1px solid rgba(255,255,255,.82);
      border-radius: 18px;
      background: rgba(255,255,255,.88);
      box-shadow: 0 28px 72px rgba(var(--theme-rgb), .18);
      backdrop-filter: blur(22px);
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
    }

    .shell-account-panel.open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .shell-account-copy {
      display: grid;
      gap: 4px;
    }

    .shell-account-copy strong {
      color: #202636;
      font-size: 15px;
    }

    .shell-account-copy span,
    .shell-guest-note {
      color: #8c98b0;
      font-size: 12px;
      line-height: 1.45;
    }

    .shell-account-copy span:empty {
      display: none;
    }

    .shell-account-panel input {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      border: 1px solid rgba(var(--theme-rgb), .2);
      border-radius: 12px;
      color: #202636;
      background: rgba(255,255,255,.76);
      outline: none;
    }

    .shell-account-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .shell-account-panel .ghost,
    .shell-account-panel .primary,
    .shell-account-panel .guest,
    .shell-account-panel .sign-out {
      min-height: 38px;
      border-radius: 12px;
    }

    .shell-account-panel .ghost {
      color: var(--theme-deep);
      box-shadow: inset 0 0 0 1px rgba(var(--theme-rgb), .16);
    }

    .shell-account-panel .primary {
      color: #fff;
      background: var(--theme);
    }

    .shell-account-panel .guest {
      color: var(--theme-deep);
      background: rgba(var(--theme-rgb), .1);
    }

    .shell-account-panel .sign-out {
      color: #d35454;
      background: rgba(211,84,84,.08);
    }

    .shell-account-panel [hidden],
    .shell-settings-menu [hidden] {
      display: none !important;
    }

    .sticky-garden-toggle {
      position: absolute;
      right: 62px;
      bottom: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 116px;
      height: 44px;
      padding: 0 14px;
      border: 1px solid rgba(255,255,255,.78);
      border-radius: 999px;
      color: var(--theme-deep);
      font-size: 13px;
      font-weight: 700;
      background: rgba(255,255,255,.78);
      box-shadow: 0 18px 46px rgba(var(--theme-rgb), .14), inset 0 1px 0 rgba(255,255,255,.86);
      backdrop-filter: blur(20px);
      pointer-events: auto;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .sticky-garden-toggle:hover {
      transform: translateY(-1px);
      box-shadow: 0 22px 54px rgba(var(--theme-rgb), .18), inset 0 1px 0 rgba(255,255,255,.9);
    }

    .sticky-garden {
      position: fixed;
      inset: 0;
      z-index: 1600;
      display: grid;
      justify-items: end;
      padding: 92px 54px 92px 110px;
      background: rgba(255,255,255,.18);
      backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
    }

    .sticky-garden.open {
      opacity: 1;
      pointer-events: auto;
    }

    .sticky-garden-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 16px;
      width: min(560px, calc(100vw - 140px));
      max-height: min(720px, calc(100vh - 150px));
      padding: 20px;
      border: 1px solid rgba(255,255,255,.82);
      border-radius: 28px;
      color: var(--theme-deep);
      background:
        linear-gradient(145deg, rgba(255,255,255,.9), rgba(var(--theme-rgb), .08)),
        rgba(255,255,255,.82);
      box-shadow: 0 34px 84px rgba(var(--theme-rgb), .2), inset 0 1px 0 rgba(255,255,255,.9);
      backdrop-filter: blur(24px);
      transform: translateY(10px);
      transition: transform .2s ease;
    }

    .sticky-garden.open .sticky-garden-panel {
      transform: translateY(0);
    }

    .sticky-garden-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .sticky-garden-title {
      display: grid;
      gap: 4px;
    }

    .sticky-garden-title strong {
      color: var(--theme-deep);
      font-size: 20px;
    }

    .sticky-garden-title span {
      color: rgba(var(--theme-rgb), .72);
      font-size: 12px;
    }

    .sticky-garden-close {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      color: var(--theme-deep);
      background: rgba(255,255,255,.6);
    }

    .sticky-garden-list {
      display: grid;
      align-content: start;
      gap: 10px;
      min-height: 0;
      overflow: auto;
      padding-right: 4px;
      scrollbar-width: thin;
      scrollbar-color: rgba(var(--theme-rgb), .24) transparent;
    }

    .sticky-garden-empty {
      margin: 30px 0 0;
      padding: 22px;
      border-radius: 20px;
      color: rgba(var(--theme-rgb), .76);
      text-align: center;
      background: rgba(255,255,255,.48);
    }

    .sticky-garden-item {
      position: relative;
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,.72);
      border-radius: 20px;
      background: rgba(255,255,255,.58);
      box-shadow: 0 12px 30px rgba(var(--theme-rgb), .1);
      transition: box-shadow .22s ease, background .22s ease;
    }

    .sticky-garden-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
    }

    .sticky-garden-name {
      min-height: 36px;
      border-radius: 12px;
      color: #6f7891;
      text-align: left;
      padding: 0 10px;
      font-weight: 700;
    }

    .sticky-garden-name:hover {
      background: rgba(var(--theme-rgb), .08);
    }

    .sticky-garden-more {
      width: 42px;
      height: 34px;
      border-radius: 12px;
      color: var(--theme-deep);
      font-size: 20px;
      line-height: 1;
      letter-spacing: 2px;
      text-align: center;
    }

    .sticky-garden-more:hover {
      background: rgba(var(--theme-rgb), .08);
    }

    .sticky-garden-menu {
      position: absolute;
      top: 48px;
      right: 12px;
      z-index: 2;
      display: grid;
      gap: 4px;
      min-width: 112px;
      padding: 7px;
      border: 1px solid rgba(255,255,255,.82);
      border-radius: 14px;
      background: rgba(255,255,255,.94);
      box-shadow: 0 18px 42px rgba(var(--theme-rgb), .16);
      opacity: 0;
      transform: translateY(-4px);
      pointer-events: none;
      transition: opacity .16s ease, transform .16s ease;
    }

    .sticky-garden-menu.open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .sticky-garden-menu button {
      padding: 8px 10px;
      border-radius: 10px;
      color: #6f7891;
      text-align: left;
    }

    .sticky-garden-menu button:hover {
      background: rgba(var(--theme-rgb), .08);
    }

    .sticky-garden-menu .danger {
      color: #d26b72;
    }

    .sticky-garden-preview {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      justify-self: center;
      width: min(430px, 100%);
      aspect-ratio: 1 / 1.02;
      max-height: 0;
      margin-top: -10px;
      padding: 0 26px;
      border: 1px solid rgba(182,156,142,.17);
      border-radius: 30px;
      color: var(--garden-note-ink, #a98f81);
      background:
        linear-gradient(145deg, rgba(255,255,255,.9), rgba(var(--garden-note-tint, 253,250,247), .73)),
        rgba(255,255,255,.72);
      box-shadow: 0 24px 58px rgba(var(--garden-note-shadow, 126,104,92), .1), inset 0 1px 0 rgba(255,255,255,.96);
      opacity: 0;
      overflow: hidden;
      transform: translateY(-8px) scale(.985);
      transition: max-height .34s ease, padding .34s ease, margin .34s ease, opacity .24s ease, transform .34s ease;
    }

    .sticky-garden-item.expanded .sticky-garden-preview {
      max-height: 560px;
      margin-top: 2px;
      padding: 26px;
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .garden-note-head,
    .garden-note-foot {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .garden-note-brand {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 24px;
      font-weight: 700;
    }

    .garden-note-brand svg,
    .garden-note-tools svg {
      width: 30px;
      height: 30px;
      stroke: currentColor;
      fill: none;
    }

    .garden-note-brand em {
      margin-top: -18px;
      font-style: normal;
      font-size: 15px;
    }

    .garden-note-meta {
      display: grid;
      justify-items: end;
      gap: 4px;
      color: color-mix(in srgb, var(--garden-note-ink, #a98f81) 78%, white);
      font-size: 14px;
    }

    .garden-note-body {
      position: relative;
      min-height: 0;
      padding-top: 26px;
      color: color-mix(in srgb, var(--garden-note-ink, #a98f81) 76%, #7b655d);
      font-size: 18px;
      line-height: 1.65;
      white-space: pre-wrap;
      overflow: hidden;
    }

    .garden-note-body img {
      max-width: 100%;
      max-height: 58%;
      object-fit: contain;
      opacity: .72;
    }

    .garden-note-doodle {
      position: absolute;
      right: 2%;
      bottom: 10px;
      width: 122px;
      color: color-mix(in srgb, var(--garden-note-ink, #a98f81) 62%, transparent);
    }

    .garden-note-foot {
      min-height: 58px;
      padding-top: 16px;
      border-top: 1px dashed color-mix(in srgb, var(--garden-note-ink, #a98f81) 28%, transparent);
      align-items: center;
    }

    .garden-note-tools {
      display: flex;
      gap: 20px;
      opacity: .95;
    }

    .garden-note-save {
      display: grid;
      place-items: center;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(255,255,255,.78);
      box-shadow: 0 10px 24px rgba(var(--garden-note-shadow, 126,104,92), .1);
    }

    .garden-dialog {
      position: fixed;
      inset: 0;
      z-index: 1800;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(255,255,255,.26);
      backdrop-filter: blur(14px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
    }

    .garden-dialog.open {
      opacity: 1;
      pointer-events: auto;
    }

    .garden-dialog-card {
      width: min(430px, calc(100vw - 34px));
      display: grid;
      gap: 14px;
      padding: 22px;
      border: 1px solid rgba(255,255,255,.86);
      border-radius: 24px;
      color: #6f7891;
      background:
        linear-gradient(145deg, rgba(255,255,255,.94), rgba(var(--theme-rgb), .08)),
        rgba(255,255,255,.88);
      box-shadow: 0 30px 80px rgba(var(--theme-rgb), .22), inset 0 1px 0 rgba(255,255,255,.94);
      backdrop-filter: blur(24px);
      transform: translateY(10px) scale(.98);
      transition: transform .2s ease;
    }

    .garden-dialog.open .garden-dialog-card {
      transform: translateY(0) scale(1);
    }

    .garden-dialog-title {
      margin: 0;
      color: var(--theme-deep);
      font-size: 18px;
      font-weight: 800;
    }

    .garden-dialog-message {
      margin: -4px 0 0;
      color: rgba(111,120,145,.82);
      font-size: 13px;
      line-height: 1.55;
    }

    .garden-dialog-input {
      width: 100%;
      height: 42px;
      padding: 0 13px;
      border: 1px solid rgba(var(--theme-rgb), .22);
      border-radius: 14px;
      color: #6f7891;
      background: rgba(255,255,255,.72);
      outline: 0;
      transition: border-color .18s ease, box-shadow .18s ease;
    }

    .garden-dialog-input:focus {
      border-color: rgba(var(--theme-rgb), .52);
      box-shadow: 0 0 0 4px rgba(var(--theme-rgb), .12);
    }

    .garden-dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 2px;
    }

    .garden-dialog-actions button {
      min-width: 82px;
      height: 38px;
      border-radius: 999px;
      font-weight: 700;
    }

    .garden-dialog-cancel {
      color: var(--theme-deep);
      background: rgba(255,255,255,.72);
      box-shadow: inset 0 0 0 1px rgba(var(--theme-rgb), .14);
    }

    .garden-dialog-confirm {
      color: #fff;
      background: var(--theme);
      box-shadow: 0 12px 24px rgba(var(--theme-rgb), .24);
    }

    .garden-dialog-confirm.danger {
      background: #d97982;
      box-shadow: 0 12px 24px rgba(217,121,130,.24);
    }

    .global-top-tools {
      position: fixed;
      top: 36px;
      right: 138px;
      z-index: 1000;
      display: flex;
      align-items: flex-start;
      pointer-events: none;
    }

    body.route-collect .global-top-tools {
      right: 42px;
    }

    .global-player {
      display: grid;
      grid-template-columns: 48px minmax(128px, 1fr) 32px 52px 32px;
      align-items: center;
      gap: 14px;
      width: 420px;
      min-width: 420px;
      height: 74px;
      padding: 10px 18px;
      border: 1px solid rgba(255,255,255,.78);
      border-radius: 28px;
      background: rgba(255,255,255,.76);
      box-shadow: 0 18px 46px rgba(var(--theme-rgb), .14), inset 0 0 22px rgba(255,255,255,.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      pointer-events: auto;
    }

    .global-player .cover {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.72), 0 8px 20px rgba(var(--theme-rgb), .18);
    }

    .global-player p {
      margin: 0;
    }

    .global-player .song-title {
      color: #202636;
      font-size: 15px;
      font-weight: 700;
    }

    .global-player .artist {
      margin-top: 5px;
      color: #9aa4b8;
      font-size: 13px;
    }

    .global-player .player-btn {
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 50%;
      color: rgba(var(--theme-rgb), .72);
      background: transparent;
      cursor: pointer;
    }

    .global-player .player-btn.play {
      width: 42px;
      height: 42px;
      color: #fff;
      background: linear-gradient(145deg, var(--theme-deep), var(--theme-soft));
      box-shadow: 0 12px 24px rgba(var(--theme-rgb), .28);
    }

    .global-player .player-btn svg {
      width: 20px;
      height: 20px;
    }

    @media (max-width: 900px) {
      .shell-sidebar {
        width: 68px;
        gap: 20px;
        padding-top: 44px;
      }

      .shell-nav-item,
      .shell-add,
      .shell-settings {
        width: 56px;
      }

      .shell-account {
        right: 20px;
        bottom: 20px;
      }

      .global-top-tools,
      body.route-with-theme .global-top-tools,
      body.route-home .global-top-tools {
        top: 18px;
        right: 92px;
      }

      .global-player,
      body.route-home .global-player {
        grid-template-columns: 42px minmax(0, 1fr) 40px;
        width: 184px;
        min-width: 184px;
        height: 64px;
        padding: 9px 10px;
        gap: 9px;
        border-radius: 23px;
      }

      .global-player .player-btn.skip,
      .global-player .artist {
        display: none;
      }

      .global-player .cover {
        width: 42px;
        height: 42px;
      }
    }
  </style>
</head>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="music/player.js"></script>
  <script>
    (() => {
      const frame = document.getElementById("portalFrame");
      const params = new URLSearchParams(window.location.search);
      const allowedRoots = ["home/", "Habitat/", "plan-journal/", "collect/", "Note/"];
      const navItems = [...document.querySelectorAll(".shell-nav-item[data-route]")];
      const accountDock = document.querySelector(".shell-account");
      const accountToggle = document.querySelector(".shell-account-toggle");
      const accountPanel = document.querySelector(".shell-account-panel");
      const accountTitle = accountPanel.querySelector("strong");
      const accountStatus = accountPanel.querySelector(".shell-account-copy span");
      const accountEmail = accountPanel.querySelector(".shell-account-email");
      const accountPassword = accountPanel.querySelector(".shell-account-password");
      const accountActions = accountPanel.querySelector(".shell-account-actions");
      const guestButton = accountPanel.querySelector("[data-account-action='guest']");
      const guestNote = accountPanel.querySelector(".shell-guest-note");
      const sidebar = document.querySelector(".shell-sidebar");
      const addButton = document.querySelector(".shell-add");
      const widgetMenu = document.querySelector(".shell-widget-menu");
      const widgetComponents = widgetMenu.querySelector(".shell-widget-components");
      const widgetDivider = widgetMenu.querySelector(".shell-widget-divider");
      const widgetHomeOptions = widgetMenu.querySelector(".shell-widget-home-options");
      const widgetEmpty = widgetMenu.querySelector(".shell-widget-empty");
      const addBubbleButton = widgetMenu.querySelector("[data-widget-action='bubble']");
      const addMoneyLedgerButton = widgetMenu.querySelector("[data-widget-action='money-ledger']");
      const addStickyNoteButton = widgetMenu.querySelector("[data-widget-action='sticky-note']");
      const settingsButton = document.querySelector(".shell-settings");
      const settingsMenu = document.querySelector(".shell-settings-menu");
      const reorderButton = settingsMenu.querySelector("[data-shell-action='reorder']");
      const saveOrderButton = settingsMenu.querySelector("[data-shell-action='save-order']");
      const signOutButton = settingsMenu.querySelector("[data-shell-action='sign-out']");
      const gardenToggle = document.querySelector(".sticky-garden-toggle");
      const garden = document.querySelector(".sticky-garden");
      const gardenClose = document.querySelector(".sticky-garden-close");
      const gardenList = document.querySelector(".sticky-garden-list");
      const gardenDialog = document.querySelector(".garden-dialog");
      const gardenDialogTitle = document.querySelector(".garden-dialog-title");
      const gardenDialogMessage = document.querySelector(".garden-dialog-message");
      const gardenDialogInput = document.querySelector(".garden-dialog-input");
      const gardenDialogCancel = document.querySelector(".garden-dialog-cancel");
      const gardenDialogConfirm = document.querySelector(".garden-dialog-confirm");
      const config = window.SUPABASE_CONFIG || {};
      const authClient = window.supabase && config.url && config.anonKey
        ? window.supabase.createClient(config.url, config.anonKey)
        : null;
      const BUBBLE_INTRO_KEY = "portalBubbleIntroPending";
      let reorderMode = false;
      let draggingNavItem = null;
      let shellUser = null;
      let pendingRestoreNote = null;
      let pendingBubbleIntro = false;
      let gardenDialogResolve = null;
      const ARCHIVE_KEY = "homeStickyNoteArchive:v1";
      const NAV_ORDER_KEY = "portalNavOrder";
      const NAV_HIDDEN_KEY = "portalHiddenComponents";
      const COMPONENT_RESTORE_ORDER = ["journal", "habitat", "bookmarks", "notes"];
      const componentItems = navItems.filter((item) => item.dataset.routeKey !== "home");

      const currentArchiveKey = () => shellUser ? `user:${shellUser.id}:${ARCHIVE_KEY}` : "";
      const navScope = () => shellUser?.id || "anonymous";
      const scopedNavKey = (base) => `${base}:${navScope()}`;

      componentItems.forEach((item) => {
        const remove = document.createElement("span");
        remove.className = "shell-nav-remove";
        remove.dataset.removeComponent = item.dataset.routeKey;
        remove.setAttribute("role", "button");
        remove.setAttribute("tabindex", "0");
        remove.setAttribute("aria-label", `移除${item.title || "组件"}`);
        remove.textContent = "−";
        item.appendChild(remove);
      });

      const readStoredArray = (key, fallback = []) => {
        try {
          const value = JSON.parse(localStorage.getItem(key) || "null");
          return Array.isArray(value) ? value : fallback;
        } catch {
          return fallback;
        }
      };

      const getSavedOrder = () => {
        const scoped = localStorage.getItem(scopedNavKey(NAV_ORDER_KEY));
        const saved = scoped === null
          ? readStoredArray(NAV_ORDER_KEY)
          : readStoredArray(scopedNavKey(NAV_ORDER_KEY));
        const known = new Set(navItems.map((item) => item.dataset.routeKey));
        return ["home", ...saved.filter((key) => key !== "home" && known.has(key)),
          ...componentItems.map((item) => item.dataset.routeKey).filter((key) => !saved.includes(key))];
      };

      const getHiddenComponents = () => {
        const known = new Set(componentItems.map((item) => item.dataset.routeKey));
        return readStoredArray(scopedNavKey(NAV_HIDDEN_KEY)).filter((key) => known.has(key));
      };

      const persistHiddenComponents = () => {
        const hidden = componentItems.filter((item) => item.hidden).map((item) => item.dataset.routeKey);
        localStorage.setItem(scopedNavKey(NAV_HIDDEN_KEY), JSON.stringify(hidden));
      };

      const applyNavLayout = () => {
        const before = document.querySelector(".shell-add");
        const byKey = new Map(navItems.map((item) => [item.dataset.routeKey, item]));
        getSavedOrder().forEach((key) => {
          const item = byKey.get(key);
          if (item) sidebar.insertBefore(item, before);
        });
        const hidden = new Set(getHiddenComponents());
        componentItems.forEach((item) => {
          item.hidden = hidden.has(item.dataset.routeKey);
        });
        const hiddenActiveItem = componentItems.find((item) => item.hidden && item.classList.contains("active"));
        if (hiddenActiveItem) navigateTo("home/index.html");
      };

      const renderWidgetMenu = () => {
        const hiddenItems = componentItems
          .filter((item) => item.hidden)
          .sort((a, b) => COMPONENT_RESTORE_ORDER.indexOf(a.dataset.routeKey)
            - COMPONENT_RESTORE_ORDER.indexOf(b.dataset.routeKey));
        widgetComponents.replaceChildren(...hiddenItems.map((item) => {
          const button = document.createElement("button");
          button.type = "button";
          button.dataset.restoreComponent = item.dataset.routeKey;
          button.append(item.querySelector("svg").cloneNode(true), document.createTextNode(item.title || "组件"));
          return button;
        }));
        const isHome = currentRoute.startsWith("home/");
        widgetHomeOptions.hidden = !isHome;
        widgetDivider.hidden = !isHome || hiddenItems.length === 0;
        widgetEmpty.hidden = hiddenItems.length > 0 || isHome;
      };

      const normalizeRoute = (value) => {
        const route = String(value || "home/index.html").replace(/^\/+/, "");
        if (route.includes("..") || !allowedRoots.some((root) => route.startsWith(root))) {
          return "home/index.html";
        }
        return route;
      };

      const isHomeRoute = (route) => normalizeRoute(route).startsWith("home/");
      const hasRememberedSession = localStorage.getItem("portalGuestSession") === "1"
        || Boolean(localStorage.getItem("portalCurrentUserId"));

      const setRouteStyle = (route) => {
        const clean = route.split(/[?#]/)[0];
        document.body.classList.toggle("route-home", clean.startsWith("home/"));
        document.body.classList.toggle("route-collect", clean.startsWith("collect/"));
        document.body.classList.toggle("route-with-theme", clean.startsWith("home/") || clean.startsWith("collect/") || clean.startsWith("Note/"));
        const activeKey = clean.startsWith("Habitat/")
          ? "habitat"
          : clean.startsWith("plan-journal/")
            ? "journal"
          : clean.startsWith("collect/")
            ? "bookmarks"
            : clean.startsWith("Note/")
              ? "notes"
              : "home";
        document.querySelectorAll(".shell-nav-item").forEach((item) => {
          item.classList.toggle("active", item.dataset.routeKey === activeKey);
        });
      };

      const requestedRoute = normalizeRoute(params.get("page"));
      const initialRoute = hasRememberedSession || isHomeRoute(requestedRoute)
        ? requestedRoute
        : "home/index.html";
      let currentRoute = initialRoute;
      frame.src = initialRoute;
      setRouteStyle(initialRoute);

      const updateAddress = (route, replace = false) => {
        const url = new URL(window.location.href);
        url.searchParams.set("page", route);
        const method = replace ? "replaceState" : "pushState";
        history[method]({ route }, "", url);
        setRouteStyle(route);
      };

      if (initialRoute !== requestedRoute) updateAddress(initialRoute, true);

      const showLoginRequired = () => {
        setAccountMessage("请先登录", "登录账号或选择游客登录后，即可使用其他组件。");
        setWidgetMenuOpen(false);
        settingsMenu.classList.remove("open");
        setAccountOpen(true);
      };

      const navigateTo = (route, replace = false) => {
        const next = normalizeRoute(route);
        if (!shellUser && !isHomeRoute(next)) {
          showLoginRequired();
          return false;
        }
        if (currentRoute === next) return;
        currentRoute = next;
        frame.src = next;
        updateAddress(next, replace);
        return true;
      };

      navItems.forEach((item) => {
        item.addEventListener("click", (event) => {
          if (event.target.closest("[data-remove-component]")) {
            event.preventDefault();
            return;
          }
          if (reorderMode) {
            event.preventDefault();
            event.stopPropagation();
            return;
          }
          if (!shellUser && item.dataset.routeKey !== "home") {
            event.preventDefault();
            event.stopPropagation();
            showLoginRequired();
            return;
          }
          navigateTo(item.dataset.route);
        });
      });

      const setWidgetMenuOpen = (open) => {
        if (open) {
          renderWidgetMenu();
          const rect = addButton.getBoundingClientRect();
          const menuHeight = widgetMenu.scrollHeight || 54;
          const top = Math.max(16, Math.min(window.innerHeight - menuHeight - 16, rect.top + rect.height / 2 - menuHeight / 2));
          widgetMenu.style.top = `${top}px`;
        }
        widgetMenu.classList.toggle("open", open);
      };

      const addHomeBubble = () => {
        try {
          frame.contentWindow.postMessage({
            type: "portal:add-home-bubble",
            user: {
              id: shellUser?.id || "",
              email: shellUser?.email || "",
              isGuest: Boolean(shellUser?.isGuest)
            }
          }, "*");
          return true;
        } catch {
          return false;
        }
      };

      const addHomeStickyNote = () => {
        try {
          frame.contentWindow.postMessage({
            type: "portal:add-home-sticky-note",
            user: {
              id: shellUser?.id || "",
              email: shellUser?.email || "",
              isGuest: Boolean(shellUser?.isGuest)
            }
          }, "*");
          return true;
        } catch {
          return false;
        }
      };

      const showHomeMoneyLedger = () => {
        try {
          frame.contentWindow.postMessage({
            type: "portal:show-home-money-ledger",
            user: {
              id: shellUser?.id || "",
              email: shellUser?.email || "",
              isGuest: Boolean(shellUser?.isGuest)
            }
          }, "*");
          return true;
        } catch {
          return false;
        }
      };

      const closeGardenDialog = (value) => {
        if (!gardenDialogResolve) return;
        const resolve = gardenDialogResolve;
        gardenDialogResolve = null;
        gardenDialog.classList.remove("open");
        gardenDialog.setAttribute("aria-hidden", "true");
        resolve(value);
      };

      const openGardenDialog = ({ title, message, value = "", input = false, danger = false }) => new Promise((resolve) => {
        gardenDialogResolve = resolve;
        gardenDialogTitle.textContent = title;
        gardenDialogMessage.textContent = message || "";
        gardenDialogInput.hidden = !input;
        gardenDialogInput.value = value;
        gardenDialogConfirm.classList.toggle("danger", danger);
        gardenDialog.classList.add("open");
        gardenDialog.setAttribute("aria-hidden", "false");
        requestAnimationFrame(() => (input ? gardenDialogInput : gardenDialogConfirm).focus());
      });

      gardenDialogCancel.addEventListener("click", () => closeGardenDialog(null));
      gardenDialogConfirm.addEventListener("click", () => {
        closeGardenDialog(gardenDialogInput.hidden ? true : gardenDialogInput.value);
      });
      gardenDialog.addEventListener("click", (event) => {
        if (event.target === gardenDialog) closeGardenDialog(null);
      });

        whale: { ink: "#7ea4cf", tint: "247,252,255", shadow: "92,128,171", icon: '<svg viewBox="0 0 38 34"><path d="M7 20c6-10 21-12 29-3-5 1-7 6-14 8-7 2-17 0-15-5Z"/><path d="M8 19c-3-1-6-5-5-9 4 1 7 4 8 8"/><path d="M25 14c3-6 8-8 11-5-1 5-5 8-10 8"/><path d="M15 17h.1"/><path d="M18 9c0-4 3-4 3 0"/><path d="M23 9c2-4 5-2 3 1"/></svg>', doodle: '<svg viewBox="0 0 130 105"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"><path d="M31 70c0-19 16-33 37-33 19 0 34 12 38 29 5-5 13-8 20-4-4 5-9 8-15 9 6 3 10 8 11 14-8 1-15-2-20-8-5 15-20 23-39 23-19 0-32-11-32-30Z"/><path d="M49 77c9 8 28 8 42 1"/><path d="M54 63h.1"/><path d="M66 73c5 4 13 4 18 0"/><path d="M61 31c0-8 6-8 6 0"/><path d="M75 31c4-8 10-4 5 2"/><path d="M49 36c-6-7 1-12 7-5"/></g></svg>' },

        cloud: { ink: "#7e97d4", tint: "248,250,255", shadow: "91,112,177", icon: '<svg viewBox="0 0 38 34"><path d="M12 25h15c5 0 8-3 8-7s-4-7-8-6C25 6 17 5 14 11 8 10 4 14 4 19c0 4 3 6 8 6Z"/><path d="M13 19h.1M24 19h.1"/><path d="M16 23c3 3 7 3 10 0"/></svg>', doodle: '<svg viewBox="0 0 130 105"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"><path d="M39 73h49c11 0 19-7 19-17 0-11-10-18-21-15-5-18-30-19-37-3-12-2-24 6-24 19 0 9 6 16 14 16Z"/><path d="M55 56h.1M78 56h.1"/><path d="M62 66c5 4 13 4 18 0"/><path d="M39 84v5M58 84v6M78 84v5"/><path d="m20 36 2-5 2 5 5 2-5 2-2 5-2-5-5-2 5-2Z"/><path d="m112 30 2-4 2 4 4 2-4 2-2 4-2-4-4-2 4-2Z"/></g></svg>' }
      };

      const readArchive = () => {
        const key = currentArchiveKey();
        if (!key) return [];
        try {
          const archive = JSON.parse(localStorage.getItem(key) || "[]");
          return Array.isArray(archive) ? archive.sort((a, b) => String(b.archivedAt || "").localeCompare(String(a.archivedAt || ""))) : [];
        } catch {
          return [];
        }
      };

      const writeArchive = (archive) => {
        const key = currentArchiveKey();
        if (key) localStorage.setItem(key, JSON.stringify(archive));
      };

      const gardenDate = (dateValue) => {
        const date = new Date(dateValue || Date.now());
        const weekdays = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];
        return {
          date: `${date.getFullYear()}.${String(date.getMonth() + 1).padStart(2, "0")}.${String(date.getDate()).padStart(2, "0")}`,
          weekday: weekdays[date.getDay()]
        };
      };

      const gardenPreview = (note) => {
        const style = gardenStyles[note.style] || gardenStyles.classic;
        const archived = gardenDate(note.archivedAt);
        const text = (note.text || "记录点什么吧...").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
        const image = note.image ? `<img src="${note.image}" alt="便签图片">` : "";
        return `
          <article class="sticky-garden-preview" style="--garden-note-ink:${style.ink};--garden-note-tint:${style.tint};--garden-note-shadow:${style.shadow};">
            <header class="garden-note-head">
              <div class="garden-note-brand">${style.icon}<strong>便签</strong><em>✦</em></div>
              <div class="garden-note-meta"><span>${archived.date}</span><span>${archived.weekday}</span><span>•••</span></div>
            </header>
            <div class="garden-note-body">${text}${image}<span class="garden-note-doodle">${style.doodle}</span></div>
            <footer class="garden-note-foot">
              <div class="garden-note-tools">
                <svg viewBox="0 0 24 24"><path d="m4 16-.8 4.2L7.5 19 18 8.5 14.5 5 4 16Z"/><path d="m13.8 5.7 3.5 3.5"/><path d="M3 21h7"/></svg>
                <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9" r="1.5"/><path d="m4 18 5-5 3 3 2.5-2.5L20 19"/></svg>
                <svg viewBox="0 0 24 24"><rect x="5" y="4" width="14" height="16" rx="2"/><path d="m8 12 3 3 5-7"/></svg>
              </div>
              <span class="garden-note-save">✦</span>
            </footer>
          </article>
        `;
      };

      const closeGardenMenus = () => {
        gardenList.querySelectorAll(".sticky-garden-menu.open").forEach((menu) => menu.classList.remove("open"));
      };

      const renderGarden = () => {
        const archive = readArchive();
        if (!archive.length) {
          gardenList.innerHTML = '<p class="sticky-garden-empty">还没有归档的便签。回到 home，把想收藏的便签放进家园吧。</p>';
          return;
        }
        gardenList.innerHTML = archive.map((note) => `
          <article class="sticky-garden-item" data-archive-id="${note.id}">
            <div class="sticky-garden-row">
              <button class="sticky-garden-name" data-garden-action="toggle" type="button">${note.name || gardenDate(note.archivedAt).date}</button>
              <button class="sticky-garden-more" data-garden-action="menu" type="button" aria-label="更多操作">•••</button>
            </div>
            <div class="sticky-garden-menu">
              <button data-garden-action="rename" type="button">编辑</button>
              <button data-garden-action="restore" type="button">恢复</button>
              <button class="danger" data-garden-action="delete" type="button">删除</button>
            </div>
            ${gardenPreview(note)}
          </article>
        `).join("");
      };

      const setGardenOpen = (open) => {
        garden.classList.toggle("open", open);
        garden.setAttribute("aria-hidden", String(!open));
        if (open) renderGarden();
        else closeGardenMenus();
      };

      const restoreArchivedNote = (note) => {
        pendingRestoreNote = {
          text: note.text || "",
          image: note.image || "",
          style: note.style || "classic",
          width: note.width || 370,
          height: note.height || 390
        };
        if (currentRoute.startsWith("home/")) {
          frame.contentWindow.postMessage({
            type: "portal:restore-home-sticky-note",
            note: pendingRestoreNote,
            user: {
              id: shellUser?.id || "",
              email: shellUser?.email || "",
              isGuest: Boolean(shellUser?.isGuest)
            }
          }, "*");
          pendingRestoreNote = null;
        } else {
          navigateTo("home/index.html");
        }
      };

      addButton.addEventListener("click", (event) => {
        event.stopPropagation();
        if (reorderMode) return;
        setWidgetMenuOpen(!widgetMenu.classList.contains("open"));
        settingsMenu.classList.remove("open");
      });

      widgetMenu.addEventListener("click", (event) => {
        const key = event.target.closest("[data-restore-component]")?.dataset.restoreComponent;
        if (!key) return;
        event.stopPropagation();
        const item = componentItems.find((candidate) => candidate.dataset.routeKey === key);
        if (!item) return;
        item.hidden = false;
        persistHiddenComponents();
        persistNavOrder();
        renderWidgetMenu();
        setWidgetMenuOpen(false);
      });

      addBubbleButton.addEventListener("click", (event) => {
        event.stopPropagation();
        if (!shellUser) {
          setWidgetMenuOpen(false);
          setAccountOpen(true);
          return;
        }
        const added = addHomeBubble();
        setWidgetMenuOpen(false);
      });

      addStickyNoteButton.addEventListener("click", (event) => {
        event.stopPropagation();
        if (!currentRoute.startsWith("home/")) return;
        if (!shellUser) {
          setWidgetMenuOpen(false);
          setAccountOpen(true);
          return;
        }
        addHomeStickyNote();
        setWidgetMenuOpen(false);
      });

      addMoneyLedgerButton.addEventListener("click", (event) => {
        event.stopPropagation();
        if (!currentRoute.startsWith("home/")) return;
        if (!shellUser) {
          setWidgetMenuOpen(false);
          setAccountOpen(true);
          return;
        }
        showHomeMoneyLedger();
        setWidgetMenuOpen(false);
      });

      document.querySelector(".shell-settings").addEventListener("click", () => {
        if (reorderMode) return;
        settingsMenu.classList.toggle("open");
      });

      applyNavLayout();

      frame.addEventListener("load", () => {
        try {
          const childUrl = new URL(frame.contentWindow.location.href);
          const shellDir = new URL("./", window.location.href).pathname;
          const route = normalizeRoute(`${childUrl.pathname.slice(shellDir.length)}${childUrl.search}${childUrl.hash}`);
          const current = normalizeRoute(new URLSearchParams(window.location.search).get("page"));
          currentRoute = route;
          if (route !== current) updateAddress(route);
          else setRouteStyle(route);
          frame.contentWindow.addEventListener("hashchange", () => {
            const changed = new URL(frame.contentWindow.location.href);
            const next = normalizeRoute(`${changed.pathname.slice(shellDir.length)}${changed.search}${changed.hash}`);
            currentRoute = next;
            updateAddress(next, true);
          });
          if (pendingRestoreNote && route.startsWith("home/")) {
            frame.contentWindow.postMessage({
              type: "portal:restore-home-sticky-note",
              note: pendingRestoreNote,
              user: {
                id: shellUser?.id || "",
                email: shellUser?.email || "",
                isGuest: Boolean(shellUser?.isGuest)
              }
            }, "*");
            pendingRestoreNote = null;
          }
          if (pendingBubbleIntro && route.startsWith("home/")) {
            frame.contentWindow.postMessage({ type: "portal:play-home-bubble-intro" }, "*");
            pendingBubbleIntro = false;
          }
        } catch {}
      });

      window.addEventListener("popstate", (event) => {
        const route = normalizeRoute(event.state?.route || new URLSearchParams(window.location.search).get("page"));
        if (!shellUser && !isHomeRoute(route)) {
          navigateTo("home/index.html", true);
          showLoginRequired();
          return;
        }
        if (currentRoute !== route) {
          currentRoute = route;
          frame.src = route;
        }
        setRouteStyle(route);
      });

      window.addEventListener("storage", (event) => {
        if (event.key === currentArchiveKey() && garden.classList.contains("open")) renderGarden();
        if (event.key !== "theme" || !event.newValue) return;
        try {
          const theme = JSON.parse(event.newValue);
          if (theme.theme) document.documentElement.style.setProperty("--theme", theme.theme);
          if (theme.deep) document.documentElement.style.setProperty("--theme-deep", theme.deep);
          if (theme.soft) document.documentElement.style.setProperty("--theme-soft", theme.soft);
          if (theme.rgb) document.documentElement.style.setProperty("--theme-rgb", theme.rgb);
        } catch {}
      });

      const setAccountOpen = (open) => {
        accountPanel.classList.toggle("open", open);
        accountToggle.setAttribute("aria-expanded", String(open));
      };

      const setAccountMessage = (title, detail) => {
        accountTitle.textContent = title;
        accountStatus.textContent = detail;
      };

      const refreshContentSession = () => {
        try {
          frame.contentWindow.location.reload();
        } catch {}
      };

      const requestHomeBubbleIntro = () => {
        try {
          localStorage.setItem(BUBBLE_INTRO_KEY, "1");
        } catch {}
        pendingBubbleIntro = true;
      };

      const applyAccountSession = (session) => {
        const guest = localStorage.getItem("portalGuestSession") === "1";
        const user = session?.user || null;
        const signedIn = Boolean(user || guest);
        shellUser = user || (guest ? { id: "guest", email: "游客", isGuest: true } : null);
        accountDock.classList.toggle("signed-in", signedIn);
        accountEmail.hidden = signedIn;
        accountPassword.hidden = signedIn;
        accountActions.hidden = signedIn;
        guestButton.hidden = signedIn;
        signOutButton.hidden = !signedIn;
        guestNote.hidden = !guest;
        if (user) {
          localStorage.setItem("portalCurrentUserId", user.id || "");
          localStorage.setItem("portalCurrentUserEmail", user.email || "");
          setAccountMessage("已登录", user.email || "账号数据已开启同步");
        } else if (guest) {
          localStorage.setItem("portalCurrentUserId", "guest");
          localStorage.removeItem("portalCurrentUserEmail");
          setAccountMessage("游客登录", "");
        } else {
          localStorage.removeItem("portalCurrentUserId");
          localStorage.removeItem("portalCurrentUserEmail");
          setAccountMessage("未登录", "登录后，网站中的数据内容可同步到你的 Supabase 账号。");
          if (!isHomeRoute(currentRoute)) navigateTo("home/index.html", true);
        }
        applyNavLayout();
        renderWidgetMenu();
      };

      accountToggle.addEventListener("click", (event) => {
        event.stopPropagation();
        setAccountOpen(!accountPanel.classList.contains("open"));
      });
      accountPanel.addEventListener("click", (event) => event.stopPropagation());
      document.addEventListener("click", (event) => {
        if (reorderMode) return;
        if (!event.target.closest(".shell-account")) setAccountOpen(false);
        if (!event.target.closest(".shell-settings-menu, .shell-settings")) settingsMenu.classList.remove("open");
        if (!event.target.closest(".shell-widget-menu, .shell-add")) setWidgetMenuOpen(false);
        if (!event.target.closest(".sticky-garden-panel, .sticky-garden-toggle")) closeGardenMenus();
      });

      gardenToggle.addEventListener("click", (event) => {
        event.stopPropagation();
        if (!shellUser) {
          setGardenOpen(false);
          setAccountOpen(true);
          return;
        }
        setAccountOpen(false);
        setGardenOpen(!garden.classList.contains("open"));
      });

      gardenClose.addEventListener("click", () => setGardenOpen(false));
      garden.addEventListener("click", (event) => {
        if (event.target === garden) setGardenOpen(false);
      });

      gardenList.addEventListener("click", async (event) => {
        const item = event.target.closest(".sticky-garden-item");
        if (!item) return;
        const action = event.target.closest("[data-garden-action]")?.dataset.gardenAction;
        const id = item.dataset.archiveId;
        const archive = readArchive();
        const note = archive.find((entry) => entry.id === id);
        if (!note || !action) return;

        if (action === "toggle") {
          item.classList.toggle("expanded");
          closeGardenMenus();
          return;
        }
        if (action === "menu") {
          event.stopPropagation();
          const menu = item.querySelector(".sticky-garden-menu");
          const open = !menu.classList.contains("open");
          closeGardenMenus();
          menu.classList.toggle("open", open);
          return;
        }
        if (action === "rename") {
          const next = await openGardenDialog({
            title: "编辑名称",
            message: "给这张归档便签起一个在家园中显示的名字。",
            value: note.name || gardenDate(note.archivedAt).date,
            input: true
          });
          if (next === null) return;
          note.name = next.trim() || gardenDate(note.archivedAt).date;
          writeArchive(archive);
          renderGarden();
          return;
        }
        if (action === "restore") {
          writeArchive(archive.filter((entry) => entry.id !== id));
          restoreArchivedNote(note);
          renderGarden();
          setGardenOpen(false);
          return;
        }
        if (action === "delete") {
          const confirmed = await openGardenDialog({
            title: "彻底删除便签",
            message: "确定要彻底删除这张归档便签吗？此操作无法撤销。",
            input: false,
            danger: true
          });
          if (!confirmed) return;
          writeArchive(archive.filter((entry) => entry.id !== id));
          renderGarden();
        }
      });

      window.addEventListener("message", (event) => {
        if (event.source !== frame.contentWindow || event.data?.type !== "portal:sticky-archive-updated") return;
        if (garden.classList.contains("open")) renderGarden();
      });

      accountPanel.addEventListener("click", async (event) => {
        const action = event.target.closest("[data-account-action]")?.dataset.accountAction;
        if (!action) return;
        if (action === "guest") {
          localStorage.setItem("portalGuestSession", "1");
          applyAccountSession(null);
          setAccountOpen(false);
          frame.contentWindow.postMessage({
            type: "portal:apply-home-session",
            user: {
              id: "guest",
              email: "游客",
              isGuest: true
            }
          }, "*");
          return;
        }
        if (!authClient) {
          setAccountMessage("Supabase 未配置", "请检查项目根目录的 supabase-config.js。");
          return;
        }
        const email = accountEmail.value.trim();
        const password = accountPassword.value;
        if (!email || !password) {
          setAccountMessage("请输入邮箱和密码", "完成后即可登录或注册。");
          return;
        }
        if (action === "sign-up") {
          const { error } = await authClient.auth.signUp({ email, password });
          setAccountMessage(error ? "注册失败" : "注册成功", error?.message || "请根据邮箱确认设置完成注册。");
          return;
        }
        localStorage.removeItem("portalGuestSession");
        const { error } = await authClient.auth.signInWithPassword({ email, password });
        if (error) {
          setAccountMessage("登录失败", error.message);
          return;
        }
        accountPassword.value = "";
        setAccountOpen(false);
        requestHomeBubbleIntro();
        refreshContentSession();
      });

      const setReorderMode = (enabled) => {
        reorderMode = enabled;
        sidebar.classList.toggle("reorder-mode", enabled);
        document.body.classList.toggle("reorder-lock", enabled);
        saveOrderButton.hidden = !enabled;
        reorderButton.textContent = enabled ? "正在调整组件顺序" : "调整组件顺序";
        reorderButton.disabled = enabled;
        signOutButton.disabled = enabled;
        settingsMenu.classList.add("open");
        setWidgetMenuOpen(false);
        setAccountOpen(false);
        setGardenOpen(false);
        sidebar.querySelectorAll(".shell-nav-item").forEach((item) => {
          item.draggable = enabled && item.dataset.routeKey !== "home";
        });
      };

      const persistNavOrder = () => {
        const order = [...sidebar.querySelectorAll(".shell-nav-item")].map((item) => item.dataset.routeKey);
        localStorage.setItem(scopedNavKey(NAV_ORDER_KEY), JSON.stringify(order));
      };

      const removeComponent = (key) => {
        const item = componentItems.find((candidate) => candidate.dataset.routeKey === key);
        if (!item) return;
        const wasActive = item.classList.contains("active");
        item.hidden = true;
        persistHiddenComponents();
        persistNavOrder();
        if (wasActive) navigateTo("home/index.html");
      };

      sidebar.addEventListener("click", (event) => {
        const remove = event.target.closest("[data-remove-component]");
        if (!remove || !reorderMode) return;
        event.preventDefault();
        event.stopPropagation();
        removeComponent(remove.dataset.removeComponent);
      });

      sidebar.addEventListener("keydown", (event) => {
        const remove = event.target.closest("[data-remove-component]");
        if (!remove || !reorderMode || !["Enter", " "].includes(event.key)) return;
        event.preventDefault();
        removeComponent(remove.dataset.removeComponent);
      });

      sidebar.addEventListener("dragstart", (event) => {
        if (!reorderMode) return;
        const item = event.target.closest(".shell-nav-item");
        if (!item || item.dataset.routeKey === "home") {
          event.preventDefault();
          return;
        }
        draggingNavItem = item;
        item.classList.add("dragging");
        event.dataTransfer.effectAllowed = "move";
      });

      sidebar.addEventListener("dragover", (event) => {
        if (!reorderMode || !draggingNavItem) return;
        event.preventDefault();
        const items = [...sidebar.querySelectorAll(".shell-nav-item:not([data-route-key='home'])")]
          .filter((item) => !item.hidden)
          .filter((item) => item !== draggingNavItem);
        const after = items.find((item) => {
          const rect = item.getBoundingClientRect();
          return event.clientY < rect.top + rect.height / 2;
        });
        sidebar.insertBefore(draggingNavItem, after || document.querySelector(".shell-add"));
      });

      sidebar.addEventListener("dragend", () => {
        draggingNavItem?.classList.remove("dragging");
        draggingNavItem = null;
      });

      settingsMenu.addEventListener("click", async (event) => {
        event.stopPropagation();
        const action = event.target.closest("[data-shell-action]")?.dataset.shellAction;
        if (reorderMode && action !== "save-order") return;
        if (action === "reorder") {
          setReorderMode(true);
          return;
        }
        if (action === "save-order") {
          persistNavOrder();
          setReorderMode(false);
          settingsMenu.classList.remove("open");
          return;
        }
        if (action === "sign-out") {
          localStorage.removeItem("portalGuestSession");
          localStorage.removeItem("portalCurrentUserId");
          localStorage.removeItem("portalCurrentUserEmail");
          if (authClient) await authClient.auth.signOut();
          applyAccountSession(null);
          settingsMenu.classList.remove("open");
          refreshContentSession();
        }
      });

      if (authClient) {
        authClient.auth.getSession().then(({ data }) => applyAccountSession(data?.session || null));
        authClient.auth.onAuthStateChange((_event, session) => applyAccountSession(session));
      } else {
        applyAccountSession(null);
      }
    })();
  </script>
</body>
</html>
